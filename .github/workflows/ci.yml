name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint:hooks

      - run: npx vitest run

      - run: npm run build

      - name: Verify build output
        # Per-file checks so a future route/asset addition churns this guard
        # instead of silently passing an aggregate count that stops meaning anything.
        run: |
          test -f dist/client/index.html
          test -d dist/client/assets

      # E2E: boots real `wrangler dev` (local workerd — no Cloudflare auth
      # needed) and drives the GameRoom DO over WebSockets. Must run AFTER
      # the build step: wrangler dev serves the dist/client assets dir.
      - name: E2E (wrangler dev)
        run: npm run test:e2e
        timeout-minutes: 15
