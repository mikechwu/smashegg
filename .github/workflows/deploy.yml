name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  # Let an in-flight deploy finish rather than cancelling it on a newer push.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npx vitest run

      - run: npm run build
        env:
          # The SAME expression feeds the client bundle here and the Worker
          # var below — build-version equality by construction.
          BUILD_VERSION: ${{ github.sha }}

      - name: Verify build output
        # Per-file checks so a future route/asset addition churns this guard
        # instead of silently passing an aggregate count that stops meaning anything.
        run: |
          test -f dist/client/index.html
          test -d dist/client/assets

      - uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # wrangler-action appends `--var BUILD_VERSION:<value>` to deploy
          # commands, reading the value from this step's env.
          vars: BUILD_VERSION
        env:
          BUILD_VERSION: ${{ github.sha }}

      - name: Post-deploy smoke check
        # Set the vars.WORKER_URL repo variable after the first manual deploy
        # reveals the workers.dev URL; skip smoke test until then.
        if: vars.WORKER_URL != ''
        # Beyond liveness, assert the deployed Worker actually serves THIS
        # commit's build — every deploy self-verifies the version signal.
        run: |
          sleep 10
          body=$(curl --fail "$WORKER_URL/api/health")
          echo "$body"
          test "$(echo "$body" | jq -r .build)" = "$GITHUB_SHA"
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
